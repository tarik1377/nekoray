name: GreenRhythm Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag"
        required: true
      publish:
        description: "Publish release (yes/no)"
        required: false
        default: "yes"
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-go:
    strategy:
      matrix:
        include:
          - cross_os: windows
            cross_arch: amd64
          - cross_os: public_res
            cross_arch: public_res
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        if: matrix.cross_os != 'public_res'
        uses: actions/setup-go@v4
        with:
          go-version: "^1.24"

      - name: Clone libneko dependency
        if: matrix.cross_os != 'public_res'
        run: |
          git clone --depth 1 https://github.com/MatsuriDayo/libneko.git ../libneko

      - name: Build Go
        if: matrix.cross_os != 'public_res'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || '' }}
        run: |
          GOOS=${{ matrix.cross_os }} GOARCH=${{ matrix.cross_arch }} ./libs/build_go.sh

      - name: Build public resources
        if: matrix.cross_os == 'public_res'
        run: ./libs/build_public_res.sh

      - name: Download rule-set files
        if: matrix.cross_os == 'public_res'
        run: |
          mkdir -p deployment/public_res
          curl -sL -o deployment/public_res/geosite-category-ads-all.srs \
            "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-category-ads-all.srs"
          curl -sL -o deployment/public_res/geoip-ru.srs \
            "https://raw.githubusercontent.com/SagerNet/sing-geoip/rule-set/geoip-ru.srs"

      - name: Tar artifacts
        run: tar czvf artifacts.tgz ./deployment

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenRhythm-${{ github.sha }}-${{ matrix.cross_os }}-${{ matrix.cross_arch }}
          path: artifacts.tgz

  build-windows:
    runs-on: windows-2022
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.2
          arch: x64

      - name: Download Qt SDK
        shell: bash
        env:
          DL_QT_VER: "6.7"
        run: bash ./libs/download_qtsdk_win.sh

      - name: Install ninja
        uses: seanmiddleditch/gha-setup-ninja@v3

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: libs/deps
          key: WinDeps-x64-${{ hashFiles('libs/build_deps_*.sh') }}-Qt6.7

      - name: Build Dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: ./libs/build_deps_all.sh

      - name: Set version from tag
        if: github.event.inputs.tag != ''
        shell: bash
        run: echo -n "${{ github.event.inputs.tag }}" > nekoray_version.txt

      - name: Build Qt GUI
        shell: bash
        env:
          DL_QT_VER: "6.7"
          RELEASE_TAG: ${{ github.event.inputs.tag || '' }}
          CC: cl.exe
          CXX: cl.exe
        run: |
          source libs/env_qtsdk.sh $PWD/qtsdk/Qt
          mkdir build
          cd build
          cmake -GNinja -DQT_VERSION_MAJOR=6 -DCMAKE_BUILD_TYPE=Release ..
          ninja -j2
          cd ..
          ./libs/deploy_windows64.sh

      - name: Tar artifacts
        shell: bash
        run: tar czvf artifacts.tgz ./deployment

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenRhythm-${{ github.sha }}-windows-x64-Qt6.7
          path: artifacts.tgz

  publish:
    name: Pack & Publish
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: download-artifact

      - name: Pack Windows Release
        run: |
          source libs/env_deploy.sh
          find . -name artifacts.tgz | xargs -n1 tar xvzf
          cd deployment
          # Copy geodata to root
          cp -r public_res/*.dat windows64/ 2>/dev/null || true
          cp -r public_res/*.db windows64/ 2>/dev/null || true
          # Copy .srs rule-sets to config/ (sing-box CWD)
          mkdir -p windows64/config
          cp public_res/*.srs windows64/config/ 2>/dev/null || true
          rm -rf public_res *.pdb
          mv windows64 GreenRhythm
          zip -r GreenRhythm-${{ github.event.inputs.tag }}-windows-x64.zip GreenRhythm
          rm -rf GreenRhythm

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenRhythm-Release-${{ github.sha }}
          path: deployment

      - name: Create GitHub Release
        if: github.event.inputs.publish == 'yes'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: GreenRhythm ${{ github.event.inputs.tag }}
          files: deployment/*.zip
          draft: false
          prerelease: false
